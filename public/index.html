<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>世足分析預測</title>
    <link rel="stylesheet" href="/styles.css?v=worldcup-street-ui-20260629" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Football Research Desk</p>
          <h1>世足分析預測</h1>
        </div>
      </section>

      <section class="module-card" aria-labelledby="worldcup-title">
        <div class="module-header">
          <div>
            <p class="eyebrow">Prediction Module</p>
            <h2 id="worldcup-title">世足預測</h2>
          </div>
          <div class="score-model">
            <span>請保持正確心態</span>
            <strong>小賭怡情 大賭郭台銘</strong>
          </div>
        </div>

        <nav class="segments" aria-label="世足預測分類">
          <button class="segment active" data-tab="today" type="button">今日賽事</button>
          <button class="segment" data-tab="tomorrow" type="button">明日賽事</button>
          <button class="segment" data-tab="hot" type="button">熱門對戰</button>
          <button class="segment" data-tab="highConfidence" type="button">高信心推薦</button>
          <button class="segment" data-tab="upsetRisk" type="button">冷門風險提醒</button>
        </nav>

        <div class="module-toolbar">
          <div>
            <strong id="activeTabTitle">今日賽事</strong>
            <span id="activeTabHint">依開賽日期與市場熱度整理。</span>
          </div>
          <button class="ghost-button" id="refreshButton" type="button">更新賽程</button>
        </div>
        <div class="live-status" id="liveStatus"></div>
        <details class="debug-panel" id="debugPanel">
          <summary>Developer Mode：資料來源 Debug</summary>
          <div class="debug-grid"></div>
        </details>

        <div class="loading-state" id="loadingState">載入賽事分析中...</div>
        <div class="match-grid" id="matchGrid" hidden></div>
      </section>
    </main>

    <template id="matchCardTemplate">
      <article class="match-card">
        <div class="match-topline">
          <span class="match-date"></span>
          <span class="risk-pill"></span>
        </div>
        <div class="match-title-row">
          <div class="team-battle">
            <div class="team-side">
              <span class="team-mark home-mark"></span>
              <strong class="home-team"></strong>
            </div>
            <span class="versus">VS</span>
            <div class="team-side">
              <span class="team-mark away-mark"></span>
              <strong class="away-team"></strong>
            </div>
          </div>
        </div>
        <div class="total-score">
          <span>AI 勝負機率</span>
          <strong></strong>
        </div>
        <div class="score-row">
          <span>預測比分</span>
          <strong class="predicted-score"></strong>
        </div>
        <div class="probability-bars"></div>
        <div class="score-predictions">
          <div class="section-label">三組預測比分，高機率排序</div>
          <div class="score-prediction-list"></div>
        </div>
        <div class="over-under-card"></div>
        <div class="recommendation-card">
          <span>推薦方向</span>
          <strong></strong>
        </div>
        <div class="estimation-notice" hidden>此分析部分資料使用估算。</div>
        <div class="match-actions">
          <button class="news-button" type="button">即時新聞</button>
          <button class="analysis-button" type="button">重新整理分析</button>
        </div>
        <div class="breakdown-summary"></div>
        <div class="news-panel" hidden></div>
        <details class="detail-panel">
          <summary>展開分析</summary>
          <div class="data-grid"></div>
        </details>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
